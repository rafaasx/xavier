<section class="hero" id="top">
  <div class="hero__panel">
    <span class="eyebrow"></span>
    <h1>Rafael Xavier</h1>
    <p class="headline" aria-live="polite" aria-atomic="true">{{ currentHeadline() }}</p>
    <p class="summary">
      Um programador apaixado pela área de tecnologia, aprendendo a produzir conteúdo, documentando sua jornada e
      compartilhando
      seus projetos e
      aprendizados.
    </p>

    <div class="actions">
      <a class="button button--primary" href="#experiences">Ver portfólio</a>
      <a class="button button--ghost" routerLink="/store">Acessar loja</a>
    </div>
  </div>

  <figure class="hero__portrait">
    <img ngSrc="/assets/portrait-rafael-no-bg.png" width="420" height="420" priority
      alt="Retrato estilizado de Rafael Xavier" />

  </figure>
</section>

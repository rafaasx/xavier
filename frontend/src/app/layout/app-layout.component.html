<a class="skip-link" href="#main-content">Pular para o conteúdo principal</a>

<div class="shell">
  @if (showHeader()) {
  <header class="topbar">
    <nav class="nav" aria-label="Principal">
      @for (item of headerLinks; track item.label) {
      <a [routerLink]="item.route" [fragment]="item.fragment" [attr.aria-label]="item.description">
        {{ item.label }}
      </a>
      }
    </nav>

    <div class="header-actions">
      <button type="button" class="theme-toggle" (click)="toggleTheme()"
        [attr.aria-label]="theme.mode() === 'dark' ? 'Ativar tema claro' : 'Ativar tema escuro'"
        [attr.aria-pressed]="theme.mode() === 'light'">
        <fa-icon [icon]="theme.mode() === 'dark' ? faSun : faMoon" />
      </button>
      <a class="admin-access" routerLink="/admin/login" aria-label="Abrir login administrativo">Admin</a>
    </div>
  </header>
  }

  <main id="main-content" class="content" tabindex="-1">
    <router-outlet />
  </main>

  <footer class="footer">
    <p>© {{ brand.name }}</p>
    <p>Todos os direitos reservados | {{ currentYear }}</p>
    <button type="button" class="footer__back-to-top" (click)="scrollToTop()">
      Voltar ao topo
    </button>
  </footer>
</div>
